services:
  broker:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9092:9092"
      - "8080:8080"
    environment:
      STREAMHUB_PORT: "9092"
      STREAMHUB_HEALTH_PORT: "8080"
      STREAMHUB_DATA: /data
    volumes:
      - broker-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  producer:
    build:
      context: .
      dockerfile: Dockerfile.sample
    command: ["producer"]
    depends_on:
      broker:
        condition: service_healthy
    environment:
      STREAMHUB_HOST: broker
      STREAMHUB_PORT: "9092"
      STREAMHUB_TOPIC: events

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.sample
    command: ["consumer"]
    depends_on:
      broker:
        condition: service_healthy
    environment:
      STREAMHUB_HOST: broker
      STREAMHUB_PORT: "9092"
      STREAMHUB_TOPIC: events
      STREAMHUB_GROUP: demo-group

volumes:
  broker-data:
